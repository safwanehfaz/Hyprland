name: Build Hyprland .deb Package

on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab
  schedule:
    - cron: '0 0 * * 0' # Optional: Run weekly to get the latest Hyprland updates
jobs:
  build-deb:
    runs-on: ubuntu-latest
    container:
      image: debian:unstable
    env:
      CC: gcc
      CXX: g++
    
    steps:
      - name: Bootstrap Git For Checkout
        run: |
          apt-get update
          apt-get install -y git ca-certificates

      - name: Checkout Hyprland Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true
      
      - name: Install Build Dependencies
        run: |
          apt-get update
          apt-get install -y \
            git ca-certificates \
            gcc g++ \
            build-essential cmake meson ninja-build pkg-config gettext \
            libwayland-dev libxkbcommon-dev libpixman-1-dev \
            libegl1-mesa-dev libgles2-mesa-dev \
            libdrm-dev libdisplay-info-dev libglib2.0-dev \
            libpango1.0-dev libxcb-composite0-dev libxcb-icccm4-dev \
            libxcb-res0-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev xwayland hwdata libxcb-errors-dev \
            glslang-dev glslang-tools wayland-protocols libvulkan-dev \
            libseat-dev libgbm-dev libudev-dev libpugixml-dev \
            libinput-dev \
            libmtdev-dev libevdev-dev libwacom-dev \
            libfmt-dev libspdlog-dev \
            libzip-dev librsvg2-dev nlohmann-json3-dev \
            libjpeg-dev libwebp-dev \
            libtomlplusplus-dev libmagic-dev \
            libxcursor-dev libre2-dev libmuparser-dev liblcms2-dev

      - name: Verify pkg-config dependency versions
        run: |
          pkg-config --modversion xkbcommon
          pkg-config --modversion wayland-server
          pkg-config --modversion wayland-protocols
          pkg-config --modversion libinput
          pkg-config --modversion xcursor
          pkg-config --modversion re2
          pkg-config --modversion muparser
          pkg-config --modversion lcms2

      - name: Build and Install hyprwayland-scanner
        run: |
          cd "$(dirname "$GITHUB_WORKSPACE")"
          git clone https://github.com/hyprwm/hyprwayland-scanner.git
          cd hyprwayland-scanner
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build -j$(nproc)
          cmake --install build
          cd "$GITHUB_WORKSPACE"

      - name: Build and Install hyprutils
        run: |
          cd "$(dirname "$GITHUB_WORKSPACE")"
          git clone https://github.com/hyprwm/hyprutils.git
          cd hyprutils
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build -j$(nproc)
          cmake --install build
          cd "$GITHUB_WORKSPACE"

      - name: Build and Install Aquamarine
        run: |
          cd "$(dirname "$GITHUB_WORKSPACE")"
          git clone https://github.com/hyprwm/aquamarine.git
          cd aquamarine
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build -j$(nproc)
          cmake --install build
          cd "$GITHUB_WORKSPACE"

      - name: Build and Install hyprlang
        run: |
          cd "$(dirname "$GITHUB_WORKSPACE")"
          git clone https://github.com/hyprwm/hyprlang.git
          cd hyprlang
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build -j$(nproc)
          cmake --install build
          cd "$GITHUB_WORKSPACE"

      - name: Build and Install hyprwire
        run: |
          cd "$(dirname "$GITHUB_WORKSPACE")"
          git clone https://github.com/hyprwm/hyprwire.git
          cd hyprwire
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build -j$(nproc)
          cmake --install build
          cd "$GITHUB_WORKSPACE"

      - name: Build and Install hyprcursor
        env:
          PKG_CONFIG_PATH: /usr/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
        run: |
          cd ..
          git clone https://github.com/hyprwm/hyprcursor.git
          cd hyprcursor
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build -j$(nproc)
          cmake --install build
          cd ../Hyprland
      
      - name: Build and Install hyprgraphics
        run: |
          cd ..
          git clone https://github.com/hyprwm/hyprgraphics.git
          cd hyprgraphics
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build -j$(nproc)
          cmake --install build
          cd ../Hyprland
          
      - name: Build Hyprland
        run: |
          # Hyprland uses CMake
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          make -j$(nproc)
          
      - name: Prepare DEBIAN Package Structure
        run: |
          # Create a fakeroot directory for packaging
          mkdir -p hyprland-deb/DEBIAN
          
          # Install the built files into the fakeroot directory
          cd build
          make install DESTDIR=../hyprland-deb
          cd ..
          cmake --build build -j$(nproc)

          # Create the DEBIAN control file
          cat <<EOF > hyprland-deb/DEBIAN/control
          Package: hyprland
          Version: $(git describe --tags --always)
          Section: x11
          Priority: optional
          Architecture: amd64
          Maintainer: Your Name <your@email.com>
          Depends: libc6, libwayland-client0, libwayland-server0, libxkbcommon0, xwayland
          Description: Hyprland - a dynamic tiling Wayland compositor
          EOF

      - name: Build .deb package
        run: |
          dpkg-deb --build hyprland-deb
          # Rename the package for clarity
          mv hyprland-deb.deb hyprland-$(git describe --tags --always)-amd64.deb

      - name: Upload .deb Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyprland-package
          path: hyprland-*.deb
